name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-unit-build:
    name: Type-check · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Extensions need the full Chromium (not headless-shell); the e2e runs it via
      # channel:'chromium' + --headless=new (INKLY_E2E_HEADLESS=1).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:headless
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
